# Hand-written manifest for the Dart protobuf baseline (protoc_plugin runtime).
# Committed and Renovate-maintained (unlike the sofab side's pubspec, which is
# regenerated by sofabgen). Deps here are the row's protobuf opponent only —
# not shared with the sofab pubspec, so no languages/versions.sh sync point.
name: pbbench
description: Protobuf (protoc_plugin) Dart benchmark opponent.
publish_to: none
version: 0.0.0

environment:
  sdk: ^3.4.0

dependencies:
  # The official Dart protobuf runtime that protoc-gen-dart targets. Must match
  # the baked protoc_plugin (protoc_plugin 25.x -> protobuf ^6.0.0); an older
  # major misses BuilderInfo methods the generated code calls (e.g. `aI`).
  protobuf: ^6.0.0
  # 64-bit integers for proto (u)int64 fields.
  fixnum: ^1.1.0
