// Local copy of ../../../schema/message.proto for the micropb target ONLY.
//
// Why a local copy instead of the shared schema:
//   micropb-gen 0.6 reads the repeated field's `packed` option straight from
//   the FileDescriptorSet and defaults to NON-packed when it is unset. proto3
//   leaves that option unset (packing is implied by the spec), so micropb emits
//   one tag per element and the wire diverges from the protobuf baseline. The
//   fix is to make the proto3-default packing EXPLICIT via `[packed=true]` on
//   every repeated scalar/fp field. This is a no-op for spec-compliant proto3
//   codecs (prost, protobuf-c, nanopb already pack), so the wire is identical —
//   494 bytes — but it is required for micropb to match. The shared schema is
//   left untouched so the other targets are unaffected.
syntax = "proto3";

package fullscale;

// Corresponds to full_scale_seq_struct_t
message FullScaleSeqStruct {
  float f32 = 1;                // 32-bit floating point
  double f64 = 2;               // 64-bit floating point
  string str = 3;                // string
  bytes bytes_field = 4;         // raw bytes
}

// Corresponds to full_scale_seq_struct_of_fp_arrays_t
message FullScaleSeqStructOfFpArrays {
  repeated float fp32 = 1 [packed=true];       // array of floats
  repeated double fp64 = 2 [packed=true];      // array of doubles
}

// Corresponds to full_scale_seq_struct_of_arrays_t
message FullScaleSeqStructOfArrays {
  repeated uint32 u8 = 1 [packed=true];
  repeated int32 i8 = 2 [packed=true];
  repeated uint32 u16 = 3 [packed=true];
  repeated int32 i16 = 4 [packed=true];
  repeated uint32 u32 = 5 [packed=true];
  repeated int32 i32 = 6 [packed=true];
  repeated uint64 u64 = 7 [packed=true];
  repeated int64 i64 = 8 [packed=true];
  FullScaleSeqStructOfFpArrays nested = 10;
}

// Corresponds to full_scale_seq_array_of_strings_t
message FullScaleSeqArrayOfStrings {
  repeated string strings = 1;  // array of strings (length-delimited, never packed)
}

// Corresponds to full_scale_example_t
message FullScaleExample {
  uint32 u8 = 1;
  int32 i8 = 2;
  uint32 u16 = 3;
  int32 i16 = 4;
  uint32 u32 = 5;
  int32 i32 = 6;
  uint64 u64 = 7;
  int64 i64 = 8;
  FullScaleSeqStruct nested = 10;
  FullScaleSeqStructOfArrays arrays = 100;
  FullScaleSeqArrayOfStrings string_array = 200;
}
