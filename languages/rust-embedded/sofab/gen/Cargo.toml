# @generated by sofabgen, patched by languages/rust-embedded/setup.sh
[package]
name = "sofabuffers-generated"
version = "0.0.0"
edition = "2021"

[lib]
name = "sofabuffers_generated"
path = "src/lib.rs"

[[bin]]
name = "harness"
path = "src/main.rs"
required-features = ["std"]

[[bin]]
name = "bench"
path = "src/bench.rs"
required-features = ["std"]

[dependencies]
sofab = { package = "sofa-buffers-corelib-no-std", path = "/workspace/vendor/corelib-rs-no-std", default-features = false, features = ["array", "fixlen", "fp64", "sequence", "value64"] }
heapless = { version = "0.8", default-features = false }
serde = { version = "1", default-features = false, features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }
sha2 = { version = "0.10", optional = true }

[features]
default = ["std"]
# std pulls serde + serde_json + sha2 so the JSON harness and bench build; a
# bare-metal consumer uses --no-default-features for a #![no_std], heap-free lib.
std = ["serde", "dep:serde_json", "dep:sha2"]
serde = ["dep:serde", "heapless/serde"]

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
